<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="模型管家">
<meta name="theme-color" content="#e94560">
<meta name="description" content="管理模型工具、配件与油漆库存">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons-192.png">
<title>模型耗材管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #eaeaea;
    --text-dim: #8892a4;
    --border: #2a3a5c;
    --warning: #f5a623;
    --success: #4caf50;
    --danger: #e94560;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0; padding: 0 24px; position: sticky; top: 0; z-index: 100; }
  nav .logo { font-weight: 700; font-size: 18px; color: var(--accent); padding: 10px 20px 10px 0; border-right: 1px solid var(--border); margin-right: 16px; white-space: nowrap; display: flex; align-items: center; gap: 10px; }
  nav .logo img { width: 38px; height: 38px; object-fit: contain; border-radius: 8px; }
  nav .logo .logo-text { display: flex; flex-direction: column; line-height: 1.15; }
  nav .logo .logo-name { font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: 1px; text-transform: uppercase; }
  nav .logo .logo-version { font-size: 10px; font-weight: 500; color: var(--accent); letter-spacing: 0.5px; }
  nav button { background: none; border: none; color: var(--text-dim); padding: 18px 16px; cursor: pointer; font-size: 14px; font-weight: 500; border-bottom: 3px solid transparent; transition: all .2s; }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  nav button:hover:not(.active) { color: var(--text); }
  nav .spacer { flex: 1; }
  nav .stats-bar { display: flex; gap: 20px; font-size: 12px; color: var(--text-dim); }
  nav .stats-bar span b { color: var(--text); }

  /* MAIN */
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  /* PAGE HEADER */
  .page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .page-header h2 { font-size: 22px; font-weight: 700; }
  .page-header .spacer { flex: 1; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #c73652; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #3a4a6c; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-danger { background: rgba(233,69,96,.15); color: var(--danger); border: 1px solid rgba(233,69,96,.3); }
  .btn-danger:hover { background: rgba(233,69,96,.3); }

  /* SEARCH & FILTERS */
  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-input { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 9px 14px; border-radius: 8px; font-size: 14px; }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { outline: none; border-color: var(--accent); }
  select.filter-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 9px 14px; border-radius: 8px; font-size: 14px; cursor: pointer; }
  select.filter-select:focus { outline: none; border-color: var(--accent); }

  /* TOOL GRID */
  .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: border-color .2s; position: relative; }
  .tool-card:hover { border-color: var(--accent2); }
  .tool-card .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .tool-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .tool-card h3 { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .tool-card .category-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 12px; margin-top: 3px; background: rgba(83,52,131,.4); color: #b39ddb; }
  .tool-card .notes { font-size: 13px; color: var(--text-dim); margin: 10px 0; line-height: 1.5; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }
  .stage-tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: rgba(233,69,96,.15); color: #ef9a9a; border: 1px solid rgba(233,69,96,.25); }
  .model-tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: rgba(79,195,247,.15); color: #81d4fa; border: 1px solid rgba(79,195,247,.3); cursor: pointer; }
  .model-tag:hover { background: rgba(79,195,247,.3); }
  .tool-card .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; gap: 6px; }
  .last-used { font-size: 11px; color: var(--text-dim); }
  .last-used.stale { color: var(--warning); }
  .card-actions { display: flex; gap: 6px; }
  .forgotten-badge { position: absolute; top: 12px; right: 12px; background: var(--warning); color: #000; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }

  /* RELATED PAINTS SECTION */
  .related-section { margin-top: 32px; }
  .related-section h3 { font-size: 15px; color: var(--text-dim); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .related-section h3 b { color: #81d4fa; }

  /* PAINT GRID */
  .paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .paint-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform .15s, border-color .2s; cursor: default; }
  .paint-card:hover { transform: translateY(-2px); border-color: var(--accent2); }
  .paint-swatch { height: 70px; width: 100%; }
  .paint-info { padding: 10px; }
  .paint-code { font-size: 12px; font-weight: 700; color: var(--text); }
  .paint-name { font-size: 11px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .paint-brand { font-size: 10px; color: #f5a623; margin-top: 2px; font-weight: 600; }
  .paint-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .paint-type { font-size: 10px; padding: 1px 6px; border-radius: 8px; }
  .type-nitro { background: rgba(233,69,96,.2); color: #ef9a9a; }
  .type-water { background: rgba(76,175,80,.2); color: #a5d6a7; }
  .type-enamel { background: rgba(255,193,7,.2); color: #ffe082; }
  .stock-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stock-full { background: var(--success); }
  .stock-half { background: var(--warning); }
  .stock-low { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .stock-empty { background: #555; }
  .paint-card .card-actions { padding: 6px 10px 10px; display: flex; gap: 5px; }
  .paint-models { padding: 0 10px 6px; display: flex; flex-wrap: wrap; gap: 3px; }
  .paint-models .model-tag { font-size: 10px; padding: 1px 6px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
  .modal-header h3 { font-size: 17px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 6px; }
  .modal-close:hover { background: var(--border); color: var(--text); }
  .modal-body { padding: 20px 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; }
  .form-control { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; }
  .form-control:focus { outline: none; border-color: var(--accent); }
  textarea.form-control { min-height: 80px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .color-preview-row { display: flex; align-items: center; gap: 12px; }
  .color-box { width: 48px; height: 48px; border-radius: 10px; border: 2px solid var(--border); flex-shrink: 0; }
  .stage-checkboxes { display: flex; flex-wrap: wrap; gap: 8px; }
  .stage-checkbox { display: flex; align-items: center; gap: 5px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; cursor: pointer; font-size: 13px; transition: all .15s; }
  .stage-checkbox input { display: none; }
  .stage-checkbox.checked { background: rgba(233,69,96,.15); border-color: rgba(233,69,96,.5); color: #ef9a9a; }

  /* TAG INPUT WIDGET */
  .tag-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; min-height: 44px; align-items: center; cursor: text; }
  .tag-input-wrap:focus-within { border-color: var(--accent); }
  .tag-chip { display: inline-flex; align-items: center; gap: 4px; background: rgba(79,195,247,.2); color: #81d4fa; border: 1px solid rgba(79,195,247,.35); border-radius: 12px; padding: 2px 8px; font-size: 12px; white-space: nowrap; }
  .tag-chip button { background: none; border: none; color: #81d4fa; cursor: pointer; font-size: 14px; line-height: 1; padding: 0 0 0 2px; opacity: .7; }
  .tag-chip button:hover { opacity: 1; }
  .tag-text-input { background: none; border: none; color: var(--text); font-size: 14px; outline: none; min-width: 100px; flex: 1; padding: 1px 0; }
  .tag-text-input::placeholder { color: var(--text-dim); }
  .form-hint { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

  .modal-footer { padding: 16px 24px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; margin-bottom: 20px; }

  /* RANDOM TIP */
  .tip-banner { background: linear-gradient(135deg, rgba(83,52,131,.3), rgba(233,69,96,.15)); border: 1px solid var(--accent2); border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; }
  .tip-banner .icon { font-size: 28px; flex-shrink: 0; }
  .tip-banner .tip-content { flex: 1; }
  .tip-banner .tip-content small { color: var(--text-dim); font-size: 12px; }
  .tip-banner .tip-content p { font-size: 14px; margin-top: 2px; }
  .tip-banner .tip-content b { color: var(--accent); }

  /* LOW STOCK ALERT */
  .alert-banner { background: rgba(233,69,96,.1); border: 1px solid rgba(233,69,96,.4); border-radius: 10px; padding: 12px 18px; margin-bottom: 16px; font-size: 14px; display: flex; align-items: center; gap: 10px; }

  /* PWA INSTALL BANNER */
  #installBanner { display:none; position:fixed; bottom:0; left:0; right:0; z-index:300;
    background: linear-gradient(135deg, #16213e, #0f3460);
    border-top: 2px solid var(--accent); padding: 14px 20px;
    display: none; align-items: center; gap: 14px; box-shadow: 0 -4px 20px rgba(0,0,0,.5); }
  #installBanner.show { display: flex; }
  #installBanner img { width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0; }
  #installBanner .install-text { flex: 1; }
  #installBanner .install-text b { display:block; font-size:14px; color:var(--text); }
  #installBanner .install-text small { font-size:12px; color:var(--text-dim); }
  #installBanner .install-actions { display:flex; gap:8px; flex-shrink:0; }

  /* SAFE AREA for iPhone notch / Dynamic Island */
  body { padding-top: env(safe-area-inset-top); background-color: var(--surface); }
  nav { padding-top: 0; }
  #installBanner { padding-bottom: max(14px, env(safe-area-inset-bottom)); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    /* NAV：logo 缩小，页面切换按钮文字隐藏只显示图标，导出导入缩成图标 */
    nav { padding: 0 12px; }
    nav .logo { padding: 8px 12px 8px 0; margin-right: 8px; }
    nav .logo img { width: 28px; height: 28px; }
    nav .logo .logo-version { display: none; }
    nav .logo .logo-name { font-size: 12px; }
    nav button { padding: 14px 10px; font-size: 13px; }
    nav .stats-bar { display: none; }
    .nav-btn-text { display: none; }

    /* MAIN 减小边距 */
    main { padding: 12px; }

    /* PAGE HEADER：标题独占一行，按钮另起一行 */
    .page-header { flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .page-header h2 { font-size: 18px; width: 100%; }
    .page-header .spacer { display: none; }
    .page-header .btn { flex: 1; justify-content: center; font-size: 13px; padding: 9px 10px; }

    /* FILTER BAR：搜索框独占一行，筛选器平分第二行 */
    .filter-bar { gap: 8px; }
    .filter-bar .search-input { width: 100%; min-width: unset; flex: unset; }
    .filter-bar .filter-select { flex: 1; min-width: 0; font-size: 12px; padding: 8px 6px; }

    /* TOOL CARDS：减小内边距 */
    .tool-card { padding: 14px; }
    .tool-card .meta { flex-direction: column; align-items: flex-start; gap: 8px; }
    .card-actions { width: 100%; justify-content: flex-end; }

    /* PAINT GRID：2列 */
    .paint-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }

    /* FORM */
    .form-row { grid-template-columns: 1fr; }

    /* MODAL：全屏从底部弹出 */
    .modal-overlay { align-items: flex-end; padding: 0; }
    .modal { border-radius: 20px 20px 0 0; max-height: 92vh; }

    /* INSTALL BANNER */
    #installBanner .install-text small { display: none; }
  }
  /* FF6 sprite animation */
  @keyframes ff6-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  .sprite { animation: ff6-float 2s ease-in-out infinite; }
  nav .logo:hover .sprite { animation-duration: 0.5s; }
  .logo { cursor: default; user-select: none; }
  /* pixel-art font feel for logo */
  nav .logo { letter-spacing: 1px; }

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const DB = {
  load(key) { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; } },
  save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
};

let tools = DB.load('model_tools');
let paints = DB.load('model_paints');

function saveTools() { DB.save('model_tools', tools); }
function savePaints() { DB.save('model_paints', paints); }

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// ─── TAG INPUT WIDGET ─────────────────────────────────────────────────────────
function handleTagInput(e, wrapId) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/,'');
    if (val) addTag(wrapId, val);
    e.target.value = '';
  } else if (e.key === 'Backspace' && e.target.value === '') {
    const chips = document.querySelectorAll(`#${wrapId} .tag-chip`);
    if (chips.length) chips[chips.length - 1].remove();
  }
}

function addTag(wrapId, text) {
  const wrap = document.getElementById(wrapId);
  const input = wrap.querySelector('.tag-text-input');
  const existing = [...wrap.querySelectorAll('.tag-chip')].map(c => c.dataset.value);
  if (existing.includes(text)) return;
  const chip = document.createElement('span');
  chip.className = 'tag-chip';
  chip.dataset.value = text;
  chip.innerHTML = `${text}<button type="button" onclick="this.parentElement.remove()">×</button>`;
  wrap.insertBefore(chip, input);
}

function getTagsFromWrap(wrapId) {
  return [...document.querySelectorAll(`#${wrapId} .tag-chip`)].map(c => c.dataset.value);
}

function setTagsToWrap(wrapId, tags) {
  const wrap = document.getElementById(wrapId);
  wrap.querySelectorAll('.tag-chip').forEach(c => c.remove());
  (tags || []).forEach(t => addTag(wrapId, t));
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'paints') { renderPaints(); renderLowStockAlert(); }
  if (name === 'tools') { renderTools(); renderTip(); }
  updateStats();
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const lowCount = paints.filter(p => p.stock === 'low' || p.stock === 'empty').length;
  document.getElementById('statsBar').innerHTML =
    `<span>工具 <b>${tools.length}</b></span>` +
    `<span>油漆 <b>${paints.length}</b></span>` +
    (lowCount ? `<span style="color:var(--danger)">⚠ 低库存 <b>${lowCount}</b></span>` : '');
}

// ─── TIP ─────────────────────────────────────────────────────────────────────
function renderTip() {
  const forgotten = getForgottenTools();
  const el = document.getElementById('tipBanner');
  if (!forgotten.length) { el.innerHTML = ''; return; }
  const t = forgotten[Math.floor(Math.random() * forgotten.length)];
  el.innerHTML = `
    <div class="tip-banner">
      <div class="icon"><span class="sprite sprite-terra2" style="width:40px;height:56px;display:block"></span></div>
      <div class="tip-content">
        <small>你有一段时间没用过这个工具了</small>
        <p>是不是忘了 <b>${t.name}</b>？${t.notes ? '（' + t.notes.slice(0,40) + '…）' : ''}</p>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="markUsedToday('${t.id}')">用了！</button>
    </div>`;
}

function getForgottenTools() {
  const cutoff = Date.now() - 14 * 24 * 3600 * 1000;
  return tools.filter(t => !t.lastUsed || new Date(t.lastUsed).getTime() < cutoff);
}

function markUsedToday(id) {
  const t = tools.find(t => t.id === id);
  if (t) { t.lastUsed = new Date().toISOString().slice(0,10); saveTools(); renderTools(); renderTip(); }
}

function pickForgottenTool() {
  const forgotten = getForgottenTools();
  if (!forgotten.length) { showKefkaToast('所有工具最近都用过了，Kefka 无话可说！', true); return; }
  const t = forgotten[Math.floor(Math.random() * forgotten.length)];
  showKefkaToast(`是不是忘了「${t.name}」？<br><small style="color:var(--text-dim)">${t.category}　上次：${t.lastUsed || '从未记录'}</small>`);
}

function showKefkaToast(msg, happy) {
  let el = document.getElementById('kefkaToast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'kefkaToast';
    el.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:var(--surface);border:2px solid var(--accent);border-radius:14px;
      padding:16px 20px;display:flex;align-items:center;gap:14px;z-index:400;
      box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:320px;width:90%;
      transition:opacity .3s;`;
    document.body.appendChild(el);
  }
  el.innerHTML = `
    <span class="sprite sprite-kefka3" style="width:36px;height:52px;flex-shrink:0;${happy?'filter:hue-rotate(120deg)':''}"></span>
    <div style="flex:1;font-size:13px;line-height:1.5">${msg}</div>
    <button onclick="this.parentElement.style.opacity=0;setTimeout(()=>this.parentElement.remove(),300)"
      style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:0;flex-shrink:0">✕</button>`;
  el.style.opacity = '1';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.opacity='0'; setTimeout(()=>el.remove(), 300); }, 4000);
}

// ─── LOW STOCK ────────────────────────────────────────────────────────────────
function renderLowStockAlert() {
  const low = paints.filter(p => p.stock === 'low' || p.stock === 'empty');
  const el = document.getElementById('lowStockAlert');
  if (!low.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="alert-banner"><span class="sprite sprite-edgar2" style="width:24px;height:34px;flex-shrink:0"></span> 以下油漆需要补货：${low.map(p => `<b>${p.code || ''} ${p.name}</b>`).join('、')}</div>`;
}

// ─── TOOLS RENDER ─────────────────────────────────────────────────────────────
const catColors = {
  '剪钳':'#4fc3f7','打磨':'#aed581','刻线':'#ffb74d','上色':'#f48fb1',
  '遮盖':'#80cbc4','后处理':'#ce93d8','拼装':'#90caf9','油漆':'#ff8a65','其他':'#bcaaa4'
};

function matchesModel(item, search) {
  return (item.models || []).some(m => m.toLowerCase().includes(search));
}

function renderTools() {
  const search = document.getElementById('toolSearch').value.toLowerCase().trim();
  const cat = document.getElementById('toolCatFilter').value;
  const stage = document.getElementById('toolStageFilter').value;

  let list = tools.filter(t => {
    if (cat && t.category !== cat) return false;
    if (stage && !(t.stages||[]).includes(stage)) return false;
    if (search) {
      const inName = t.name.toLowerCase().includes(search);
      const inNotes = (t.notes||'').toLowerCase().includes(search);
      const inModels = matchesModel(t, search);
      if (!inName && !inNotes && !inModels) return false;
    }
    return true;
  });

  const grid = document.getElementById('toolsGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon"><span class="sprite sprite-locke2" style="width:56px;height:72px;display:block;margin:0 auto 8px"></span></div><p>${tools.length ? '没有符合条件的工具' : '还没有添加工具，点击「新增工具」开始吧！'}</p></div>`;
  } else {
    const cutoff14 = Date.now() - 14 * 24 * 3600 * 1000;
    grid.innerHTML = list.map(t => {
      const stale = !t.lastUsed || new Date(t.lastUsed).getTime() < cutoff14;
      const lastUsedText = t.lastUsed ? `上次使用：${t.lastUsed}` : '从未记录';
      const stageTags = (t.stages||[]).map(s => `<span class="stage-tag">${s}</span>`).join('');
      const modelTags = (t.models||[]).map(m =>
        `<span class="model-tag" onclick="quickSearchModel('${m}')" title="点击搜索该模型所有物料">${m}</span>`
      ).join('');
      const color = catColors[t.category] || '#bcaaa4';
      return `
        <div class="tool-card">
          ${stale ? '<span class="forgotten-badge">久未使用</span>' : ''}
          <div class="card-header">
            <div class="tool-icon" style="background:${color}22;color:${color}">${t.emoji||'🔧'}</div>
            <div>
              <h3>${t.name}</h3>
              <span class="category-tag">${t.category}</span>
            </div>
          </div>
          ${t.notes ? `<div class="notes">${t.notes}</div>` : ''}
          ${stageTags ? `<div class="tag-row">${stageTags}</div>` : ''}
          ${modelTags ? `<div class="tag-row">${modelTags}</div>` : ''}
          <div class="meta">
            <span class="last-used ${stale?'stale':''}">${lastUsedText}</span>
            ${t.qty != null && t.qty !== '' ? `<span style="font-size:12px;color:var(--text-dim)">×<b style="color:var(--text)">${t.qty}</b></span>` : ''}
            <div class="card-actions">
              <button class="btn btn-sm btn-secondary" onclick="markUsedToday('${t.id}')">✓ 用了</button>
              <button class="btn btn-sm btn-secondary" onclick="openToolModal('${t.id}')">编辑</button>
              <button class="btn btn-sm btn-danger" onclick="deleteTool('${t.id}')">删</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  renderRelatedPaints(search);
}

// 点击模型标签快速搜索
function quickSearchModel(name) {
  document.getElementById('toolSearch').value = name;
  renderTools();
}

// ─── RELATED PAINTS (cross-module search) ─────────────────────────────────────
const stockLabel = { full:'满瓶', half:'半瓶', low:'快用完', empty:'已空' };
const stockClass = { full:'stock-full', half:'stock-half', low:'stock-low', empty:'stock-empty' };
const typeClass = { '硝基漆':'type-nitro', '水性漆':'type-water', '珐琅漆':'type-enamel' };

function renderRelatedPaints(search) {
  const sec = document.getElementById('relatedPaintsSection');
  if (!search) { sec.innerHTML = ''; return; }

  const matched = paints.filter(p => matchesModel(p, search));
  if (!matched.length) { sec.innerHTML = ''; return; }

  sec.innerHTML = `
    <div class="related-section">
      <h3><span class="sprite sprite-edgar2" style="width:24px;height:34px"></span> 「<b>${search}</b>」相关油漆 <span style="font-size:12px;font-weight:400">(${matched.length} 款)</span></h3>
      <div class="paint-grid">
        ${matched.map(p => `
          <div class="paint-card">
            <div class="paint-swatch" style="background:${p.color||'#555'}"></div>
            <div class="paint-info">
              <div class="paint-code">${p.code||'—'}</div>
              <div class="paint-name" title="${p.name}">${p.name}</div>
              <div class="paint-brand">${p.brand}</div>
              <div class="paint-footer">
                <span class="paint-type ${typeClass[p.type]||''}">${p.type}</span>
                <span title="${stockLabel[p.stock]}" class="stock-dot ${stockClass[p.stock]||''}"></span>
              </div>
            </div>
            ${p.usage ? `<div style="padding:0 10px 4px;font-size:10px;color:var(--text-dim)">${p.usage}</div>` : ''}
            <div class="card-actions">
              <button class="btn btn-sm btn-secondary" style="flex:1" onclick="openPaintModal('${p.id}')">编辑</button>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function deleteTool(id) {
  if (!confirm('确定删除这个工具？')) return;
  tools = tools.filter(t => t.id !== id);
  saveTools(); renderTools(); updateStats();
}

// ─── TOOL MODAL ───────────────────────────────────────────────────────────────
function openToolModal(id) {
  document.getElementById('toolModalTitle').textContent = id ? '编辑工具' : '新增工具';
  document.getElementById('toolId').value = id || '';
  document.querySelectorAll('#toolStages .stage-checkbox').forEach(el => {
    el.classList.remove('checked');
    el.querySelector('input').checked = false;
  });
  if (id) {
    const t = tools.find(t => t.id === id);
    document.getElementById('toolName').value = t.name;
    document.getElementById('toolCat').value = t.category;
    document.getElementById('toolNotes').value = t.notes || '';
    document.getElementById('toolEmoji').value = t.emoji || '';
    document.getElementById('toolQty').value = t.qty != null ? t.qty : '';
    setTagsToWrap('toolModelsWrap', t.models || []);
    (t.stages||[]).forEach(s => {
      const el = [...document.querySelectorAll('#toolStages .stage-checkbox')].find(el => el.querySelector('input').value === s);
      if (el) { el.classList.add('checked'); el.querySelector('input').checked = true; }
    });
  } else {
    document.getElementById('toolName').value = '';
    document.getElementById('toolCat').value = '剪钳';
    document.getElementById('toolNotes').value = '';
    document.getElementById('toolEmoji').value = '';
    document.getElementById('toolQty').value = '';
    setTagsToWrap('toolModelsWrap', []);
  }
  document.getElementById('toolModal').classList.add('open');
}

function toggleStage(el) {
  el.classList.toggle('checked');
  el.querySelector('input').checked = el.classList.contains('checked');
}

function saveTool() {
  const name = document.getElementById('toolName').value.trim();
  if (!name) { alert('请输入工具名称'); return; }
  const stages = [...document.querySelectorAll('#toolStages .stage-checkbox.checked')].map(el => el.querySelector('input').value);
  const models = getTagsFromWrap('toolModelsWrap');
  const id = document.getElementById('toolId').value;
  const qtyVal = document.getElementById('toolQty').value;
  const qty = qtyVal !== '' ? Number(qtyVal) : null;
  if (id) {
    const t = tools.find(t => t.id === id);
    t.name = name;
    t.category = document.getElementById('toolCat').value;
    t.notes = document.getElementById('toolNotes').value.trim();
    t.emoji = document.getElementById('toolEmoji').value.trim();
    t.stages = stages;
    t.models = models;
    t.qty = qty;
  } else {
    tools.push({
      id: genId(), name,
      category: document.getElementById('toolCat').value,
      notes: document.getElementById('toolNotes').value.trim(),
      emoji: document.getElementById('toolEmoji').value.trim(),
      stages, models, lastUsed: null, qty
    });
  }
  saveTools(); closeModal('toolModal'); renderTools(); renderTip(); updateStats();
}

// ─── PAINTS RENDER ────────────────────────────────────────────────────────────
function renderPaints() {
  const search = document.getElementById('paintSearch').value.toLowerCase().trim();
  const brand = document.getElementById('paintBrandFilter').value;
  const type = document.getElementById('paintTypeFilter').value;
  const stockF = document.getElementById('paintStockFilter').value;

  let list = paints.filter(p => {
    if (brand && p.brand !== brand) return false;
    if (type && p.type !== type) return false;
    if (stockF === 'low' && p.stock !== 'low') return false;
    if (stockF === 'empty' && p.stock !== 'empty') return false;
    if (search) {
      const inCode = (p.code||'').toLowerCase().includes(search);
      const inName = p.name.toLowerCase().includes(search);
      const inModels = matchesModel(p, search);
      if (!inCode && !inName && !inModels) return false;
    }
    return true;
  });

  const grid = document.getElementById('paintsGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon"><span class="sprite sprite-celes2" style="width:56px;height:72px;display:block;margin:0 auto 8px"></span></div><p>${paints.length ? '没有符合条件的油漆' : '还没有添加油漆，点击「新增油漆」开始吧！'}</p></div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const modelTags = (p.models||[]).map(m => `<span class="model-tag">${m}</span>`).join('');
    return `
      <div class="paint-card">
        <div class="paint-swatch" style="background:${p.color||'#555'}"></div>
        <div class="paint-info">
          <div class="paint-code">${p.code || '—'}</div>
          <div class="paint-name" title="${p.name}">${p.name}</div>
          <div class="paint-brand">${p.brand}</div>
          <div class="paint-footer">
            <span class="paint-type ${typeClass[p.type]||''}">${p.type}</span>
            <span style="display:flex;align-items:center;gap:4px">
              ${p.qty != null ? `<span style="font-size:10px;color:var(--text-dim)">×<b style="color:var(--text)">${p.qty}</b></span>` : ''}
              <span title="${stockLabel[p.stock]}" class="stock-dot ${stockClass[p.stock]||''}"></span>
            </span>
          </div>
        </div>
        ${modelTags ? `<div class="paint-models">${modelTags}</div>` : ''}
        <div class="card-actions">
          <button class="btn btn-sm btn-secondary" style="flex:1" onclick="openPaintModal('${p.id}')">编辑</button>
          <button class="btn btn-sm btn-danger" onclick="deletePaint('${p.id}')">删</button>
        </div>
      </div>`;
  }).join('');
}

function deletePaint(id) {
  if (!confirm('确定删除这个油漆？')) return;
  paints = paints.filter(p => p.id !== id);
  savePaints(); renderPaints(); renderLowStockAlert(); updateStats();
}

// ─── PAINT MODAL ──────────────────────────────────────────────────────────────
function openPaintModal(id) {
  document.getElementById('paintModalTitle').textContent = id ? '编辑油漆' : '新增油漆';
  document.getElementById('paintId').value = id || '';
  if (id) {
    const p = paints.find(p => p.id === id);
    document.getElementById('paintBrand').value = p.brand;
    document.getElementById('paintType').value = p.type;
    document.getElementById('paintCode').value = p.code || '';
    document.getElementById('paintName').value = p.name;
    document.getElementById('paintColor').value = p.color || '#333333';
    document.getElementById('paintColorHex').value = p.color || '#333333';
    document.getElementById('colorPreviewBox').style.background = p.color || '#333333';
    document.getElementById('paintStock').value = p.stock;
    document.getElementById('paintQty').value = p.qty != null ? p.qty : '';
    document.getElementById('paintUsage').value = p.usage || '';
    document.getElementById('paintNotes').value = p.notes || '';
    setTagsToWrap('paintModelsWrap', p.models || []);
  } else {
    document.getElementById('paintBrand').value = '田宫 Tamiya';
    document.getElementById('paintType').value = '硝基漆';
    document.getElementById('paintCode').value = '';
    document.getElementById('paintName').value = '';
    document.getElementById('paintColor').value = '#888888';
    document.getElementById('paintColorHex').value = '#888888';
    document.getElementById('colorPreviewBox').style.background = '#888888';
    document.getElementById('paintStock').value = 'full';
    document.getElementById('paintQty').value = '';
    document.getElementById('paintUsage').value = '';
    document.getElementById('paintNotes').value = '';
    setTagsToWrap('paintModelsWrap', []);
  }
  document.getElementById('paintModal').classList.add('open');
}

function updateColorPreview() {
  const c = document.getElementById('paintColor').value;
  document.getElementById('colorPreviewBox').style.background = c;
  document.getElementById('paintColorHex').value = c;
}

function syncColorFromHex() {
  let v = document.getElementById('paintColorHex').value.trim();
  if (!v.startsWith('#')) v = '#' + v;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    document.getElementById('paintColor').value = v;
    document.getElementById('colorPreviewBox').style.background = v;
  }
}

function savePaint() {
  const name = document.getElementById('paintName').value.trim();
  if (!name) { alert('请输入颜色名称'); return; }
  const id = document.getElementById('paintId').value;
  const data = {
    brand: document.getElementById('paintBrand').value,
    type: document.getElementById('paintType').value,
    code: document.getElementById('paintCode').value.trim(),
    name,
    color: document.getElementById('paintColor').value,
    stock: document.getElementById('paintStock').value,
    qty: document.getElementById('paintQty').value !== '' ? Number(document.getElementById('paintQty').value) : null,
    usage: document.getElementById('paintUsage').value.trim(),
    notes: document.getElementById('paintNotes').value.trim(),
    models: getTagsFromWrap('paintModelsWrap')
  };
  if (id) {
    Object.assign(paints.find(p => p.id === id), data);
  } else {
    paints.push({ id: genId(), ...data });
  }
  savePaints(); closeModal('paintModal'); renderPaints(); renderLowStockAlert(); updateStats();
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────────
function exportData() {
  const data = { version: 1, exportedAt: new Date().toISOString(), tools, paints };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `模型耗材备份_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.tools) || !Array.isArray(data.paints)) {
        alert('文件格式不正确，请选择由本应用导出的备份文件。');
        return;
      }
      if (!confirm(`即将导入：${data.tools.length} 个工具、${data.paints.length} 款油漆。\n\n这将覆盖当前所有数据，确定继续吗？`)) return;
      tools = data.tools;
      paints = data.paints;
      saveTools();
      savePaints();
      renderTools();
      renderTip();
      renderPaints();
      renderLowStockAlert();
      updateStats();
      alert(`导入成功！共载入 ${tools.length} 个工具、${paints.length} 款油漆。`);
    } catch {
      alert('读取文件失败，请确认文件未损坏。');
    }
  };
  reader.readAsText(file, 'utf-8');
  e.target.value = '';
}

// ─── SMART PARSE ─────────────────────────────────────────────────────────────
const PARSE_RULES = {
  brand: [
    { pattern: /田宫|tamiya/i,           value: '田宫 Tamiya' },
    { pattern: /mr\.?color|郡仕|gsi/i,   value: 'Mr.Color' },
    { pattern: /盖亚|gaianotes|gaia/i,   value: '盖亚 Gaianotes' },
    { pattern: /vallejo|凡尔哈/i,        value: '凡尔哈 Vallejo' },
    { pattern: /ak\s*interactive|胡须/i, value: '胡须 AK Interactive' },
    { pattern: /finisher'?s/i,           value: "Finisher's" },
  ],
  type: [
    { pattern: /硝基|lacquer|拉卡/i,     value: '硝基漆' },
    { pattern: /水性|acrylic|水溶/i,     value: '水性漆' },
    { pattern: /珐琅|enamel/i,           value: '珐琅漆' },
  ],
  code: /\b([A-Z]{1,3}[-_]?\d{1,4}[A-Z]?)\b/i,
  name: [
    /哑光黑|flat\s*black|消光黑/i,
    /哑光白|flat\s*white|消光白/i,
    /纯白|pure\s*white/i,
    /红色|red/i, /蓝色|blue/i, /绿色|green/i,
    /黄色|yellow/i, /橙色|orange/i,
    /灰色|灰|grey|gray/i,
    /银色|silver/i, /金色|gold/i,
    /棕色|brown/i, /紫色|purple/i,
    /黑色|black/i, /白色|white/i,
    /肤色|flesh/i, /土黄|tan/i,
  ]
};

let parsedResult = {};

function openParseModal() {
  document.getElementById('parseInput').value = '';
  document.getElementById('parsePreview').style.display = 'none';
  document.getElementById('parseConfirmBtn').style.display = 'none';
  parsedResult = {};
  document.getElementById('parseModal').classList.add('open');
  setTimeout(() => document.getElementById('parseInput').focus(), 100);
}

function doParse() {
  const text = document.getElementById('parseInput').value.trim();
  if (!text) { alert('请先粘贴商品标题'); return; }

  parsedResult = { brand: '其他', type: '硝基漆', code: '', name: '' };

  for (const r of PARSE_RULES.brand) {
    if (r.pattern.test(text)) { parsedResult.brand = r.value; break; }
  }
  for (const r of PARSE_RULES.type) {
    if (r.pattern.test(text)) { parsedResult.type = r.value; break; }
  }

  const codeMatch = text.match(PARSE_RULES.code);
  if (codeMatch) parsedResult.code = codeMatch[1].toUpperCase();

  // 尝试从常见颜色名提取
  for (const pat of PARSE_RULES.name) {
    const m = text.match(pat);
    if (m) { parsedResult.name = m[0]; break; }
  }
  // 如果没匹配到颜色名，截取色号后面的中文词
  if (!parsedResult.name && parsedResult.code) {
    const afterCode = text.replace(parsedResult.code, '').replace(/[^一-龥a-zA-Z\s]/g, ' ').trim();
    const words = afterCode.split(/\s+/).filter(w => w.length >= 2 && /[一-龥]/.test(w));
    if (words.length) parsedResult.name = words[0];
  }
  if (!parsedResult.name) parsedResult.name = parsedResult.code || text.slice(0, 12);

  // 渲染预览
  const tag = (label, val, color) =>
    `<span style="font-size:12px;padding:3px 10px;border-radius:12px;background:${color}22;color:${color};border:1px solid ${color}55">
      <span style="opacity:.6">${label} </span><b>${val}</b>
    </span>`;

  document.getElementById('parsePreviewContent').innerHTML =
    tag('品牌', parsedResult.brand, '#b39ddb') +
    tag('类型', parsedResult.type, '#a5d6a7') +
    (parsedResult.code ? tag('色号', parsedResult.code, '#81d4fa') : '') +
    tag('颜色名', parsedResult.name, '#f48fb1');

  document.getElementById('parsePreview').style.display = 'block';
  document.getElementById('parseConfirmBtn').style.display = 'inline-flex';
}

function confirmParse() {
  closeModal('parseModal');
  openPaintModal();
  // 填入解析结果
  const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
  setTimeout(() => {
    setVal('paintBrand', parsedResult.brand);
    setVal('paintType',  parsedResult.type);
    setVal('paintCode',  parsedResult.code);
    setVal('paintName',  parsedResult.name);
    // 品牌如果是自定义，select 可能没有该选项，回退到「其他」
    const brandEl = document.getElementById('paintBrand');
    if (brandEl.value !== parsedResult.brand) brandEl.value = '其他';
  }, 50);
}

// ─── MODAL UTILS ─────────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); }));

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderTools(); renderTip(); updateStats();

// ─── PWA ──────────────────────────────────────────────────────────────────────
let deferredInstallPrompt = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  });
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // 只在没有已安装且用户没有关闭过的情况下显示
  if (!localStorage.getItem('pwa_dismissed')) {
    document.getElementById('installBanner').classList.add('show');
  }
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
  deferredInstallPrompt = null;
});

function doInstall() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(choice => {
    if (choice.outcome === 'accepted') {
      document.getElementById('installBanner').classList.remove('show');
    }
    deferredInstallPrompt = null;
  });
}

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('pwa_dismissed', '1');
}

// iOS Safari：检测到是 Safari 且尚未安装时显示操作提示
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandaloneMode = window.navigator.standalone === true;
if (isIOS && !isInStandaloneMode && !localStorage.getItem('ios_dismissed')) {
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('iosBanner').style.display = 'block';
    }, 2000);
  });
}
</script>
